<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Save The Ship — Matchmaking</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="styles/index.css">
    </head>
    <body>
        <div class="card" id="matchmakingCard">
            <h1 class="game-name">Save The Ship</h1>
            <p class="card-subtitle">Matchmaking</p>

            <input type="text" id="playerName" placeholder="Enter your name" autocomplete="off" />

            <button id="findMatchBtn">Find Match</button>

            <div class="status" id="status"></div>
            <div class="result" id="result"></div>
        </div>

        <div class="lobby-view" id="lobbyView">
            <h1 class="game-name">Save The Ship</h1>
            <p class="lobby-label">Game Lobby</p>
            <div class="lobby-info" id="lobbyInfo"></div>
            <p class="lobby-countdown hidden" id="lobbyCountdown">Starting in 10...</p>
            <p class="players-title">Players in lobby</p>
            <ul class="player-list" id="playerList"></ul>
        </div>
        
        <script type="module" src="src/core/gameLobby.js"></script>
    </body>
</html>
