<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Save The Ship — Matchmaking</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="styles/index.css">
    </head>
    <body>
        <div class="card" id="matchmakingCard">
            <h1 class="game-name">Save The Ship</h1>
            <p class="card-subtitle">Matchmaking</p>

            <input type="text" id="playerName" placeholder="Enter your name" autocomplete="off" />

            <button id="findMatchBtn">Find Match</button>

            <div class="status" id="status"></div>
            <div class="result" id="result"></div>
        </div>
        
        <div class="players-section">
          <h3>Players</h3>
          <ul id="playersList"></ul>
        </div>
        
        <div class="controls-section">
          <h3>Controls</h3>
          <p><strong>W/A/S/D</strong> or <strong>Arrow Keys</strong> - Move</p>
          <p><strong>Mouse</strong> - Look Around</p>
          <p><strong>SPACE</strong> - Jump</p>
          <p id="instructions">Connecting...</p>
        </div>
      
    </body>

  <script type="module" src="src/core/gameLobby.js"></script>
</body>
</html>
